# Nihongo Lab — Worker
#
# Two things this Worker does:
#   1. Daily reminder (cron) — POSTs to ntfy.sh, push notification on phone
#   2. AI chat proxy (POST /chat) — proxies Gemini 2.0 Flash so the key
#      stays as a Worker secret, never in the repo or in the browser
#
# Setup:
#   1. Install Wrangler:        npm install -g wrangler
#   2. Login to Cloudflare:     wrangler login
#   3. Edit `vars.NTFY_TOPIC` below to YOUR private topic name
#   4. Get a Gemini API key (free) at https://aistudio.google.com/apikey
#   5. Add it as a secret:      wrangler secret put GEMINI_API_KEY
#                               (paste the key when prompted)
#   6. Optional: edit `crons` to your preferred reminder time (UTC!)
#   7. Deploy:                  wrangler deploy
#   8. The Worker URL is shown after deploy — paste it into the chat
#      widget's Settings (⚙) in the app the first time you open chat.
#
# The Worker is COMPLETELY SEPARATE from your Pages site. Free tier covers
# 100k requests/day and unlimited cron invocations. Gemini free tier is
# 15 RPM / 1500 RPD / 1M tokens per day — more than enough for personal use.

name = "nihongo-lab-reminder"
main = "index.js"
compatibility_date = "2025-01-01"

[vars]
# Your private ntfy topic name. Pick something unguessable.
NTFY_TOPIC = "shishir-japanese-CHANGE-THIS-TO-A-RANDOM-STRING"

# Optional override of the rotating notification title.
NTFY_TITLE = "🇯🇵 Nihongo Lab"

# CORS allowlist for the /chat endpoint. Locked to the Pages origin so
# random websites can't make browser-side calls and burn the Gemini quota.
# (Doesn't stop curl/scripts — but stops casual abuse from other sites.)
ALLOWED_ORIGIN = "https://npl-shishir-paudel.github.io"

# Daily email reminder via Resend (free tier, sends to yourself only).
# RESEND_API_KEY is a Worker SECRET — set with `wrangler secret put RESEND_API_KEY`.
REMINDER_EMAIL = "shishirmaidenrocklife@gmail.com"
REMINDER_NAME = "Shishir"

# KV namespace — stores user progress + reminder preferences. Read at every
# cron run; written when the app syncs (chapter complete, settings change).
# Created with: wrangler kv namespace create STATE
[[kv_namespaces]]
binding = "STATE"
id = "da93ea93fb884a2183826f6dc76aa0c1"

# Triggers — runs every hour. The Worker checks the user's preferred hour
# from KV (set via the app's Settings panel) and sends ONLY when current
# UTC hour matches. This way "reminder time" is changeable from the app
# without redeploying the Worker.
[triggers]
crons = ["0 * * * *"]
