# Nihongo Lab — daily-reminder Worker
# Runs once a day on a cron trigger and POSTs a reminder to ntfy.sh,
# which delivers a free push notification to your phone via the ntfy app.
#
# Setup:
#   1. Install Wrangler:        npm install -g wrangler
#   2. Login to Cloudflare:     wrangler login
#   3. Edit `vars.NTFY_TOPIC` below to YOUR private topic name
#      (something nobody else can guess — like "shishir-japanese-7f3k2")
#   4. Optional: edit `crons` to your preferred reminder time (UTC!)
#   5. Deploy:                  wrangler deploy
#   6. Install ntfy app on phone, subscribe to the same topic name
#   7. Wait until the cron fires — your phone gets a push.
#
# The Worker is COMPLETELY SEPARATE from your Pages site. Free tier covers
# 100k requests/day and unlimited cron invocations.

name = "nihongo-lab-reminder"
main = "index.js"
compatibility_date = "2025-01-01"

[vars]
# Your private ntfy topic name. Pick something unguessable.
# Anyone who knows the topic can read your notifications, so keep it secret.
NTFY_TOPIC = "shishir-japanese-CHANGE-THIS-TO-A-RANDOM-STRING"

# Override default messages here if you want, otherwise the Worker rotates
# through a built-in set.
NTFY_TITLE = "🇯🇵 Nihongo Lab"

# Triggers section — daily reminder schedule.
# Format: standard cron, in UTC.
# Examples:
#   "0 12 * * *"  = 12:00 UTC daily  (e.g. 21:00 JST = 17:45 NPT)
#   "0 13 * * *"  = 13:00 UTC daily  (e.g. 18:45 NPT)
#   "30 13 * * *" = 13:30 UTC daily  (e.g. 19:15 NPT)
# Convert your local desired time to UTC. Nepal is UTC+5:45.
[triggers]
crons = ["0 13 * * *"]
